# URL architecture decision record — 2026-07-22
# Maps each content type's current path to its planned path.
# "migrate: false" means keep the current path — no physical rename.
# "migrate: true" means future work will create the new path.
# This file is a decision document, not a redirect config.

content_types:

  - type: disease_intelligence
    description: Template A — pre-rendered disease hub pages
    current_path_pattern: disease-intelligence/<slug>.html
    target_path_pattern: diseases/<slug>/   # per strategy doc §2
    migrate: false
    reason: >
      ~135 indexed files with real inbound links. A path rename is a separate
      migration project with its own redirect risk. New template output (B, C)
      should use fresh paths, not retrofit into this tree. Keep existing pages
      at their current URLs; apply thin-content gate in-place (Ticket 4).

  - type: pais_cohorts
    description: Template D — generated cohort record pages
    current_path_pattern: pais-cohorts/<id>.html
    target_path_pattern: cohorts/<id>-<short-slug>/
    migrate: false
    reason: >
      Generated by scripts/build_pais_cohorts.py, indexed, with inbound links.
      Keep current paths. The pais-cohorts.html index page already exists.
      Ticket 3 extends this generator in-place rather than moving output.

  - type: therapeutic_agents
    description: Template C — per-agent hub pages (new, does not exist yet)
    current_path_pattern: null
    target_path_pattern: agents/<slug>/
    migrate: true   # new generation, nothing to move
    reason: >
      No agent pages exist today. Build fresh under /agents/ per strategy doc §2.
      Ticket 5 creates the generator and output.

  - type: disease_agent_pairs
    description: Template B — disease×agent evidence pages (new, does not exist yet)
    current_path_pattern: null
    target_path_pattern: diseases/<disease-slug>/<agent-slug>/
    migrate: true   # new generation, nothing to move
    reason: >
      The highest-volume template per strategy doc. Build fresh under
      /diseases/<slug>/<agent-slug>/ as a child of the disease hub path.
      But note: the disease hubs themselves stay at disease-intelligence/<slug>.html
      (see disease_intelligence entry above) until a separate migration is done.
      This means B pages will live under /diseases/ while their A parent
      remains at disease-intelligence/ — the internal-link graph (Ticket 7)
      must handle this cross-tree reference.

  - type: pathogen_hubs
    description: Template E — per-pathogen landing pages (new, does not exist yet)
    current_path_pattern: null
    target_path_pattern: pathogens/<slug>/
    migrate: true   # new generation
    reason: >
      No pathogen pages exist. Build under /pathogens/ per strategy doc §2.

  - type: cohort_index
    description: cohort listing page
    current_path_pattern: pais-cohorts.html
    target_path_pattern: cohorts/   # or cohorts/index.html
    migrate: false
    reason: >
      pais-cohorts.html exists and is indexed. Do not redirect until Ticket 3
      ships the extended cohort pages and a /cohorts/ index exists.
      At that point, add a 301 from pais-cohorts.html -> /cohorts/.
      Until then, leave it alone.

# Summary of rules:
# 1. Do NOT physically rename disease-intelligence/ or pais-cohorts/ directories.
# 2. Build new template output under /agents/, /pathogens/, /diseases/<slug>/<agent-slug>/.
# 3. When /cohorts/ index exists (Ticket 3+), add 301 redirect from pais-cohorts.html.
# 4. The disease-intelligence/ -> /diseases/ rename is a separate, future migration project.