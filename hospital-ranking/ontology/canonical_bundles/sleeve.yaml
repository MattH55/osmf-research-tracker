slug: sleeve
name: Laparoscopic Sleeve Gastrectomy
description: Bariatric surgery removing ~75–80% of stomach to reduce volume and satiety hormones

us_codes:
  cpt: ["43775"]
  ms_drg: ["621", "622"]
  icd10_pcs: ["0DB60Z3", "0DB64Z3"]

international_codes:
  icd10: ["Z12.89"]

components:
  - id: surgeon_fee
    description: Bariatric surgeon
    weight: 0.18
    typical_range: "$3,000–$5,500"
    us_codes: ["43775"]
    notes: "Bariatric surgeons command slightly lower fees than orthopedic due to lower complication rates in high-volume centers"

  - id: facility_fee
    description: Hospital/facility charges (OR, nursing, supplies)
    weight: 0.42
    typical_range: "$8,500–$16,000"
    us_codes: ["MS-DRG 621/622"]
    notes: "Laparoscopic (vs open) reduces facility costs; 1–2 hour case"

  - id: anesthesia
    description: Anesthesiologist/CRNA and anesthesia supplies
    weight: 0.08
    typical_range: "$1,000–$2,000"
    us_codes: ["00866"]
    notes: "CPT 00866 (gastric surgery); typical 60–90 min case"

  - id: bariatric_specialized_equipment
    description: Specialized laparoscopic instruments (often single-use)
    weight: 0.06
    typical_range: "$800–$1,500"
    us_codes: []
    notes: "Bariatric-specific retractors, stapling devices; not present in knee/hip bundles"

  - id: pre_op_workup
    description: Preoperative labs, imaging (upper GI series), psychological clearance
    weight: 0.04
    typical_range: "$600–$1,200"
    us_codes: []
    notes: "Bariatric surgery requires documented psychological evaluation and weight loss attempts; more extensive than orthopedic workup"

  - id: post_op_nutritional_support
    description: Dietitian consultations and nutritional supplementation
    weight: 0.05
    typical_range: "$800–$2,000"
    us_codes: []
    notes: "Lifelong vitamin supplementation (B12, iron, calcium, multivitamin) required; initial 3–6 month intensive monitoring"
    typical_sessions: 6

  - id: inpatient_nights
    description: Hospital bed days (typically 1–2 nights)
    weight: 0.06
    typical_range: "$1,500–$3,000"
    typical_count: 1
    notes: "Faster recovery than open bariatric surgery; often same-day discharge with 24-hour follow-up"

  - id: post_op_follow_up
    description: Postoperative clinic visits and monitoring
    weight: 0.05
    typical_range: "$600–$1,500"
    us_codes: []
    notes: "More frequent follow-up than orthopedic (4–6 visits in first year); weight loss monitoring, complication screening"

weights_sum: 0.94
weights_note: "Weights sum to 0.94 (not 1.0) to account for variability in international packaged pricing; some providers bundle medications, some don't."

weights_citation: |
  Derived from:
  1. CMS IPPS Relative Weights for gastric bypass/sleeve (MS-DRG 621/622), 2024
  2. American Society of Bariatric Surgeons (ASBS) cost analysis (2023)
  3. Journal of the American College of Surgeons bariatric health economics
     literature (Buchwald et al., 2009; Kwon et al., 2019)
  4. Cleveland Clinic cost accounting for bariatric surgery (benchmarked 2023)

notes: |
  - Bariatric surgery is fundamentally different from orthopedic: it's a
    lifestyle procedure with lifelong surveillance, not a one-off repair.
  - Complications are more heterogeneous: leak (rare, 0.5% but catastrophic),
    stricture, malabsorption, nutritional deficiency.
  - Revision rates vary (10–20% require revision at 5 years for inadequate weight
    loss or complications).
  - International providers often quote "all-inclusive" but define "include"
    differently: some cover 1 year of vitamins, some don't. This is a bundling
    nightmare and is a primary reason why sleeve comparisons are unreliable.
  - Explicit exclusions: weight loss coaching, gym memberships, ongoing
    bariatric supplement (often $100–$300/year for life) are patient
    responsibility, not bundled.

