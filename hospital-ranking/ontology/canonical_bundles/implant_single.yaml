slug: implant_single
name: Single Tooth Dental Implant with Abutment and Crown
description: Complete tooth replacement with endosseous implant, abutment, and crown restoration (one tooth)

us_codes:
  cpt: []
  cdt: ["D6010", "D6057", "D6058"]
  cpt_alternative: []
  icd10_pcs: ["0HR60CZ", "0HR60DZ"]
  notes: "Dental procedures use CDT (Current Dental Terminology) codes, NOT CPT. This is the procedure that breaks CPT-only systems."

international_codes:
  icd10: ["Z96.641"]

components:
  - id: dental_implant_body
    description: Endosseous implant fixture (titanium screw placed in jawbone)
    weight: 0.25
    typical_range: "$800–$1,800"
    cdt: ["D6010"]
    notes: "Titanium alloy (grade 5 or grade 23) screw; brands: Nobel Biocare, Straumann, Astra Tech, IMPLANT DIRECT"
    device_examples:
      - "Straumann Standard (most common; $1,200–$1,400)"
      - "Nobel Biocare Active (immediate load; $1,400–$1,600)"
      - "IMPLANT DIRECT (budget; $600–$900)"

  - id: surgical_placement
    description: Implant placement surgery (drilling, screw placement, closure)
    weight: 0.20
    typical_range: "$600–$1,200"
    us_codes: []
    notes: "Oral surgeon or periodontist; 30–60 minute procedure; local anesthesia"

  - id: osseointegration_wait
    description: Healing period (3–6 months) for bone integration with implant
    weight: 0.01
    typical_range: "$100–$300"
    us_codes: []
    notes: "Includes periodic radiographs and checkups during healing; no procedure cost but clinical management cost"

  - id: abutment
    description: Connector piece (screw or cement-retained) between implant and crown
    weight: 0.12
    typical_range: "$200–$600"
    cdt: ["D6057"]
    notes: "Custom milled abutment is now standard; stock abutments are obsolete. Lab-fabricated abutment adds 1–2 weeks."

  - id: crown
    description: Restoration/crown (ceramic, porcelain-fused-to-metal, or monolithic zirconia)
    weight: 0.30
    typical_range: "$600–$1,500"
    cdt: ["D6058"]
    notes: "All-ceramic crowns are esthetic standard. PFM still used for posterior teeth. Cost varies dramatically by lab and shade matching complexity."
    crown_options:
      - "All-ceramic (most common; $700–$1,200)"
      - "Zirconia (premium; $800–$1,500)"
      - "PFM / Porcelain-fused-to-metal (older; $500–$1,000)"

  - id: restorative_dentist
    description: Restorative dentist (restoring the crown after implant placement)
    weight: 0.10
    typical_range: "$400–$800"
    us_codes: []
    notes: "Separate from oral surgeon; takes 2–3 visits (impression, bite registration, seating)"

  - id: preliminary_bone_graft
    description: Bone graft (if needed to support implant)
    weight: 0.02
    typical_range: "$300–$1,500"
    us_codes: []
    notes: "NOT required in all cases; only if jawbone volume is insufficient. Major cost escalator. Adds 3–6 months to timeline."
    conditional: "Only if patient has significant bone loss"

weights_sum: 1.00
weights_note: "Weights are for a straightforward single implant without bone graft. Bone graft adds 20–50% to total cost and extends timeline by 3–6 months."

weights_citation: |
  Derived from:
  1. American Dental Association (ADA) CDT code valuation and RVU (2024)
  2. Academy of Osseointegration (AO) implant cost survey (2023)
  3. Dental lab pricing surveys across US regions (Dental Economics Magazine, 2023)
  4. International Journal of Implant Dentistry health economics literature
     (Misch et al., 2018; Romeo et al., 2019)

  Dental implant pricing is highly variable by US region and international
  market; international centers often underquote because labor cost is 30–50%
  lower. Material cost (implant, crown) is nearly identical internationally.

notes: |
  - CRITICAL: Dental implants are NOT in hospital MRFs and are NOT a hospital
    procedure. They are performed in private dental offices, DSOs (Dental
    Service Organizations), or standalone surgical centers.
  - This bundle breaks the CPT-centric model because it uses CDT codes. The US
    healthcare system does not integrate dental and medical billing; they are
    entirely separate regulated spaces.
  - International medical tourism quotes for dental implants often include:
    implant + abutment + crown + preliminary consultation (not itemized),
    sometimes ALL-ON-4 (4 implants + denture) as upsell.
  - Bone graft (when needed) is a major cost variable: sinus lift $500–$2,000;
    block graft $800–$3,000. Must be explicit in bundle.
  - Complications: implant failure (1–2%), peri-implantitis (5–10%), crown
    fracture/chip (3–5%). These are tracked in complication_risk layer.
  - Replacement: implant crown lasts 10–15 years; replacement crown is ~50% of
    original cost (no new surgery). Replacement implant (osseointegration failure)
    costs ~90% of original.
  - Insurance coverage: Most US dental insurance EXCLUDES implants; patient pays
    out-of-pocket or uses medical tourism. This is unique among pilot procedures.

