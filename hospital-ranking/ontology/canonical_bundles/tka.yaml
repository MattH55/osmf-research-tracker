slug: tka
name: Total Knee Arthroplasty
description: Complete episode of care for total knee replacement including all preoperative, operative, and immediate postoperative components

us_codes:
  cpt: ["27447"]
  ms_drg: ["469", "470"]
  icd10_pcs: ["0SRC0JZ", "0SRD0JZ"]

international_codes:
  icd10: ["Z12.89"]

components:
  - id: surgeon_fee
    description: Orthopedic surgeon
    weight: 0.20
    typical_range: "$3,500–$6,000"
    us_codes: ["27447"]
    notes: "Typically paid separately from facility in US outpatient settings; bundled in inpatient DRG"

  - id: facility_fee
    description: Hospital/facility charges (operating room, nursing, sterile processing)
    weight: 0.45
    typical_range: "$9,000–$18,000"
    us_codes: ["MS-DRG 469/470"]
    notes: "Largest component; includes room/board, nursing staff, supplies"

  - id: anesthesia
    description: Anesthesiologist/CRNA and anesthesia supplies
    weight: 0.08
    typical_range: "$1,200–$2,400"
    us_codes: ["01402"]
    notes: "CPT code 01402 (knee joint replacement); typically billed separately"

  - id: implant_device
    description: Prosthetic knee implant (tibia, femur, patellar components)
    weight: 0.15
    typical_range: "$4,000–$8,000"
    us_codes: []
    notes: "May or may not be line-itemized in US MRFs; often bundled in DRG. International packages always itemize brand."
    device_examples:
      - "Stryker Triathlon"
      - "Zimmer Biomet Persona"
      - "Smith & Nephew Journey"

  - id: pre_op_workup
    description: Preoperative labs, imaging, clearance visits
    weight: 0.03
    typical_range: "$400–$800"
    us_codes: []
    notes: "Labs (CBC, CMP), EKG, chest X-ray, anesthesia clearance"

  - id: post_op_physio
    description: Physical therapy and rehabilitation
    weight: 0.04
    typical_range: "$1,200–$3,000"
    us_codes: []
    notes: "Typical 6–12 outpatient sessions over 6–12 weeks"
    typical_sessions: 12

  - id: inpatient_nights
    description: Hospital bed days (inpatient stay)
    weight: 0.05
    typical_range: "$2,000–$4,000"
    typical_count: 2
    notes: "Modern fast-track TKA often 1–2 nights; traditional 2–3 nights"

weights_sum: 1.00
weights_citation: |
  Derived from:
  1. CMS Inpatient Hospital Prospective Payment System (IPPS) relative weights
     and time-weighted component analysis (2024)
  2. U.S. News & World Report cost survey of academic medical centers (2023)
  3. Journal of Arthroplasty health economics literature (Slover et al., 2016;
     Padegimas et al., 2019)

  Surgeon (20%): Typical CMS Physician Fee Schedule for CPT 27447 ~$1,600 of
  $8,000 bundled facility price.

  Implant (15%): Reported list prices $4,500–$7,500; hospitals negotiate 20–40%
  discount.

  Physio (4%): 12 sessions @ $100–$250/session; often covered separately by
  insurance but included in packaged international pricing.

notes: |
  - US hospital MRFs report facility charges only (DRG-bundled). Surgeon and
    anesthesia are billed separately by their own entities, not visible in the
    hospital price file.
  - International packages almost always include all components explicitly,
    which is the critical asymmetry.
  - Revision surgeries (due to infection, loosening, etc.) are NOT included in
    this bundle; revision rates are tracked separately in complication_risk layer.
  - Home care, assistive devices (walker, crutches), and patient transportation
    are explicitly excluded; these vary by patient and are captured in the
    episode/total_cost layer.

