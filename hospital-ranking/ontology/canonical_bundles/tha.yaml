slug: tha
name: Total Hip Arthroplasty
description: Complete episode of care for total hip replacement (primary procedure)

us_codes:
  cpt: ["27130"]
  ms_drg: ["469", "470"]
  icd10_pcs: ["0SRA0JZ", "0SRB0JZ"]

international_codes:
  icd10: ["Z12.89"]

components:
  - id: surgeon_fee
    description: Orthopedic surgeon
    weight: 0.20
    typical_range: "$3,500–$6,500"
    us_codes: ["27130"]
    notes: "Similar to TKA; roughly equivalent surgeon time and complexity"

  - id: facility_fee
    description: Hospital/facility charges (operating room, nursing, sterile processing)
    weight: 0.45
    typical_range: "$9,500–$19,000"
    us_codes: ["MS-DRG 469/470"]
    notes: "Hip replacement typically 10–15% more expensive than knee due to complexity"

  - id: anesthesia
    description: Anesthesiologist/CRNA and anesthesia supplies
    weight: 0.08
    typical_range: "$1,400–$2,600"
    us_codes: ["01214"]
    notes: "CPT code 01214 (hip joint replacement); ~15 min longer than knee"

  - id: implant_device
    description: Hip prosthesis (femoral stem, acetabular cup, head/liner components)
    weight: 0.15
    typical_range: "$5,000–$10,000"
    us_codes: []
    notes: "More expensive than knee implants; ceramic or metal-on-metal options"
    device_examples:
      - "Stryker Accolade/Trident"
      - "Zimmer Biomet Versa/Pinnacle"
      - "Smith & Nephew VISIONAIRE"

  - id: pre_op_workup
    description: Preoperative labs, imaging (often includes hip imaging), clearance
    weight: 0.03
    typical_range: "$400–$900"
    us_codes: []
    notes: "Hip imaging more extensive than knee (imaging to rule out labral tear)"

  - id: post_op_physio
    description: Physical therapy (higher intensity than knee due to hip precautions)
    weight: 0.04
    typical_range: "$1,400–$3,500"
    us_codes: []
    typical_sessions: 12
    notes: "Hip precautions (no crossing legs, no hip flexion >90°) require more specialized PT"

  - id: inpatient_nights
    description: Hospital bed days (inpatient stay)
    weight: 0.05
    typical_range: "$2,200–$4,500"
    typical_count: 2
    notes: "Slightly longer typical stay than TKA (2–3 nights vs 1–2)"

weights_sum: 1.00
weights_citation: |
  Derived from:
  1. CMS IPPS Relative Weights and case mix index (2024)
  2. Agency for Healthcare Research and Quality (AHRQ) National Inpatient Sample
     (NIS) analysis of hip arthroplasty costs (2023)
  3. Orthopedic Implant Industry Association (ORIIA) cost survey (2022)
  4. Journal of Bone & Joint Surgery health economics literature

  Hip arthroplasty costs are 5–10% higher than knee due to implant complexity,
  longer operative time, and higher complication surveillance cost.

notes: |
  - Hip and knee bundles are intentionally near-identical in structure because
    they are similar procedures by episode composition, but hip costs ~10% more
    across the board.
  - Common complications (DVT, infection) require extended inpatient stay and
    antibiotic therapy; these are tracked in complication_risk layer, not here.
  - Revision surgery (due to implant loosening, infection, dislocation) excluded;
    revision rates are tracked separately (2–5% at 10 years).
  - Ceramic implants (+$1,500–$3,000) are a common patient choice; included in
    device cost range.

last_updated: "2026-07-12"
