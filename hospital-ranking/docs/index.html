<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PriceOS - Honest Medical Price Comparisons</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .container {
            text-align: center;
            max-width: 600px;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
        p {
            font-size: 1.2rem;
            margin-bottom: 2rem;
            opacity: 0.9;
        }
        .stats {
            background: rgba(255,255,255,0.1);
            padding: 2rem;
            border-radius: 12px;
            margin-bottom: 2rem;
            backdrop-filter: blur(10px);
        }
        .stat-item {
            margin-bottom: 1rem;
        }
        .stat-number {
            font-size: 2rem;
            font-weight: bold;
            color: #fbbf24;
        }
        .stat-label {
            font-size: 0.9rem;
            opacity: 0.8;
        }
        .cta-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn {
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-block;
        }
        .btn-primary {
            background: white;
            color: #667eea;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
        }
        .btn-secondary {
            background: transparent;
            color: white;
            border: 2px solid white;
        }
        .btn-secondary:hover {
            background: white;
            color: #667eea;
        }
        footer {
            margin-top: 2rem;
            opacity: 0.7;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>PriceOS</h1>
    <p>Honest medical price comparisons with full transparency</p>
    
    <div class="stats">
        <div class="stat-item">
            <div class="stat-number">21,005</div>
            <div class="stat-label">Price Observations</div>
        </div>
        <div class="stat-item">
            <div class="stat-number">1,999</div>
            <div class="stat-label">US Hospitals</div>
        </div>
        <div class="stat-item">
            <div class="stat-number">5</div>
            <div class="stat-label">International Countries</div>
        </div>
        <div class="stat-item">
            <div class="stat-number">100%</div>
            <div class="stat-label">Auditable & Transparent</div>
        </div>
    </div>

    <div class="cta-buttons">
        <a href="methodology.html" class="btn btn-primary">Read Methodology</a>
        <a href="https://github.com/MattH55/osmf-research-tracker/tree/main/hospital-ranking" class="btn btn-secondary">View on GitHub</a>
    </div>

    <footer>
        <p>
            🔬 Built by <a href="https://opensourcemed.info" style="color: white;">OpenSourceMed</a><br>
            v0.1.0 | Comparing medical prices with integrity
        </p>
    </footer>
</div>
</body>
</html>
