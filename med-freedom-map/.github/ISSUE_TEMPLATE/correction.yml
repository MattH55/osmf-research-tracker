name: "Suggest a Correction"
description: "Report an error or outdated information on a Medical Freedom Maps page"
title: "[Correction] <jurisdiction> — <layer>: <short description>"
labels: ["correction", "needs-review"]
body:
  - type: markdown
    attributes:
      value: |
        **Thank you for helping us keep Medical Freedom Maps accurate.**

        Every correction must include a citation URL. Submissions without a verifiable source will be closed.

  - type: input
    id: page_url
    attributes:
      label: "Page URL"
      description: "The URL of the page containing the error"
      placeholder: "https://opensourcemed.info/maps/scope-of-practice/montana/"
    validations:
      required: true

  - type: input
    id: jurisdiction
    attributes:
      label: "Jurisdiction"
      description: "Which state or jurisdiction does this correction apply to?"
      placeholder: "US-MT (Montana)"
    validations:
      required: true

  - type: input
    id: layer
    attributes:
      label: "Layer"
      description: "Which layer does this concern? (e.g., scope_of_practice, certificate_of_need)"
      placeholder: "scope_of_practice"
    validations:
      required: true

  - type: input
    id: dimension
    attributes:
      label: "Dimension"
      description: "Which specific dimension or value is incorrect? (e.g., np_practice_authority)"
      placeholder: "np_practice_authority"

  - type: textarea
    id: current_value
    attributes:
      label: "What does the map currently show?"
      description: "Copy the value currently displayed"
    validations:
      required: true

  - type: textarea
    id: corrected_value
    attributes:
      label: "What should it show?"
      description: "The corrected value"
    validations:
      required: true

  - type: input
    id: citation_url
    attributes:
      label: "Citation URL"
      description: "A link to the official source (statute, regulation, agency guidance) that supports the correction"
      placeholder: "https://leg.mt.gov/bills/mca/title_0370/chapter_0080/part_0020/section_0020/0370-0080-0020-0020.html"
    validations:
      required: true

  - type: textarea
    id: citation_text
    attributes:
      label: "Citation / Statute Reference"
      description: "The legal citation (e.g., Mont. Code Ann. § 37-8-202)"
      placeholder: "Mont. Code Ann. § 37-8-202"

  - type: textarea
    id: additional_context
    attributes:
      label: "Additional context"
      description: "Any other context, explanation, or links that help verify this correction"